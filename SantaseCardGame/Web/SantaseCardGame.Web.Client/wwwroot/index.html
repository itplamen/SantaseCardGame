<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SantaseCardGame.Web.Client</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/components/card-component.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <app>Loading...</app>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
            crossorigin="anonymous"></script>
    <script>
        function playCard(id) {
            let card = $('#' + id);
            let trickCards = $('#TrickCards');
            let parentId = card.parent().attr('id');

            if (parentId === 'FirstPlayerCards') {
                card.addClass('first-player-trick-card');
            }
            else {
                card.addClass('second-player-trick-card');
            }

            card.removeClass('card-component');
            trickCards.append(card);
        }

        function clearTrick() {
            $('#TrickCards').empty()
        }
    </script>
</body>
</html>
